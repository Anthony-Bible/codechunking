# Base configuration for CodeChunking
api:
  host: 0.0.0.0
  port: 8080
  read_timeout: 10s
  write_timeout: 10s

worker:
  concurrency: 12
  queue_group: workers
  job_timeout: 30m  # Overall timeout for complete job processing
                    # Must be larger than (gemini.timeout × max_chunks_per_repo)
                    # to allow all embeddings to complete

database:
  host: localhost
  port: 5432
  name: codechunking
  sslmode: disable
  max_connections: 25
  max_idle_connections: 5

# Connectors are managed declaratively here; keep defaults commented to avoid
# unintentionally reconciling organization-specific integrations on startup.
# connectors:
#   - name: "my-gitlab"
#     type: gitlab
#     base_url: https://gitlab.example.com
#     auth_token: "${GITLAB_TOKEN}"
#     groups:
#       - my-group

nats:
  url: nats://localhost:4222
  max_reconnects: 5
  reconnect_wait: 2s

search:
  iterative_scan_mode: relaxed_order  # pgvector 0.8.0+ iterative scanning mode
                                       # Options: "off", "strict_order", "relaxed_order"
                                       # relaxed_order recommended for best recall/performance

# Zoekt full-text search configuration
zoekt:
  webserver:
    host: zoekt-webserver
    port: 6071
    timeout: 30s

  indexing:
    git_index_path: zoekt-git-index
    index_dir: /data/index
    max_file_size: 10485760  # 10MB
    include_tests: true
    include_vendor: false
    default_priority: 1.0
    timeout: 30m

  search:
    max_results: 100
    max_match_per_file: 1000
    context_lines: 2
    timeout: 10s

  concurrent_indexing:
    enabled: true
    max_concurrent_jobs: 5
    retry_attempts: 3

# Embedding provider selection.
# Provider can be "gemini" (default, uses the gemini: block below) or "openai"
# (uses embedding.openai). The openai provider also works with any
# OpenAI-compatible server (Azure OpenAI, vLLM, Ollama, LM Studio, Together.ai)
# by setting embedding.openai.base_url.
#
# Important: dimensions MUST be 768 to match the vector(768) pgvector column.
# OpenAI's text-embedding-3-small / text-embedding-3-large support arbitrary
# dimensions via the dimensions parameter (Matryoshka). text-embedding-ada-002
# is locked at 1536 and is rejected at config-validation time.
embedding:
  provider: gemini   # gemini | openai
  # openai:
  #   api_key: "${OPENAI_API_KEY}"
  #   base_url: "https://api.openai.com/v1"   # default; override for compatible servers
  #   model: text-embedding-3-small
  #   dimensions: 768
  #   max_retries: 3
  #   timeout: 60s
  #   batch_size: 256                         # max 2048 per OpenAI sync API
  #   # Opt-in: when true, prefix-truncate + L2-renormalize the response vector
  #   # to `dimensions` if the server returned more. Use this for MRL-trained
  #   # models served behind backends that ignore the `dimensions` request
  #   # parameter (e.g. LM Studio always returns the model's native dim).
  #   # Leave false for OpenAI proper or any server that honors `dimensions` —
  #   # the default strict-equality check catches typo'd model/dim configs.
  #   truncate_dimensions: false

gemini:
  model: gemini-embedding-001
  max_retries: 3
  timeout: 120s  # Per-request timeout for embedding generation
                 # Applied to each individual embedding API call
                 # Should be less than worker job_timeout
  batch:
    enabled: true
    input_dir: /tmp/batch_embeddings/input
    output_dir: /tmp/batch_embeddings/output
    poll_interval: 5s
    max_wait_time: 30m

# Batch processing configuration for enhanced embedding generation
batch_processing:
  # Enable queue-based batch processing alongside individual processing
  enabled: true
  # Threshold for switching to batch processing (chunks > this value use batch)
  threshold_chunks: 50
  # Fallback configuration
  fallback_to_sequential: true  # Fall back to individual processing on batch failures
  queue_limits:
    max_queue_size: 10000       # Maximum requests in queue
    max_wait_time: 30m          # Maximum time waiting in queue
  # Test embeddings configuration (for development/testing only)
  use_test_embeddings: false
  # Batch chunking strategy parameters
  max_batch_size: 500           # Maximum chunks per API batch
  initial_backoff: 30s          # Initial backoff delay for retries
  max_backoff: 300s             # Maximum backoff delay
  max_retries: 3                # Maximum retry attempts per batch
  enable_batch_chunking: true   # Enable/disable batch chunking

  # Batch Submitter configuration (rate-limit-aware submission)
  submitter_poll_interval: 5s         # How often to check for pending submissions
  max_concurrent_submissions: 1       # Max parallel Gemini API submissions (1 = safest)
  submission_initial_backoff: 1m      # Initial backoff on rate limit
  submission_max_backoff: 30m         # Maximum backoff duration
  max_submission_attempts: 10         # Max retry attempts per batch submission

  # Token counting configuration
  token_counting:
    enabled: true                    # Enable token counting
    mode: "all"                      # Mode: "all", "sample", or "on_demand"
    sample_percent: 10               # Percentage of chunks to sample (for "sample" mode)
    max_tokens_per_chunk: 8192       # Maximum tokens per chunk (Gemini embedding model limit)

log:
  level: info
  format: json

# Client CLI configuration
# NOTE: The CLI client auto-discovers config files named ".codechunking" (e.g.
# ~/.codechunking.yaml or ./.codechunking.yaml). This file (config.yaml) is NOT
# loaded automatically by the client; use --config configs/config.yaml or set
# CODECHUNK_* environment variables to supply these values to the CLI.
client:
  api_url: http://localhost:8080
  timeout: 30s
  search:
    limit: 10
    threshold: 0.7
    sort: similarity:desc
  repos:
    poll_interval: 5s   # matches client.DefaultPollInterval
    wait_timeout: 30m   # matches client.DefaultMaxWait

# Connectors are managed declaratively here; the API is read-only for connectors.
# Auth tokens support environment variable expansion: ${GITLAB_TOKEN}
#
# connectors:
#   - name: "my-gitlab"
#     type: "gitlab"
#     base_url: "https://gitlab.com"
#     auth_token: "${GITLAB_TOKEN}"
#     groups:
#       - "my-group"
#       - "another-group"
#     projects:
#       - "my-group/my-project"
